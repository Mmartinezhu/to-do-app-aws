name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      REACT_APP_API_BASE_URL: https://example.execute-api.us-east-1.amazonaws.com/dev
      REACT_APP_API_KEY: test-api-key
      REACT_APP_COGNITO_USER_POOL_ID: us-east-1_example
      REACT_APP_COGNITO_CLIENT_ID: example-client-id

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
